# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

vars:
  REGISTRY: fredplex
  IMAGE: nordvpn
  GIT_HASH:
    sh: git log --format="%h" -n 1
  GIT_TAG:
    sh: git tag --points-at HEAD

env:
  DOCKER_BUILDKIT: "1"

tasks:
  default:
    cmds:
      - 'echo "Version:    {{.GIT_TAG | default `(no tag on HEAD)`}}"'
      - 'echo "GIT Commit: {{.GIT_HASH}}"'
    silent: true
  env:
    desc: |
            Print all environment variables sorted alphabetically
    cmds:
      - env | sort
    silent: true

  docker-build:
    desc: |
            Build the docker image for testing
    cmds:
      - docker build --platform linux/amd64 . -f  Dockerfile -t "{{.REGISTRY}}/{{.IMAGE}}:{{.GIT_HASH}}" --build-arg="IMAGE_VERSION={{.GIT_HASH}}"

  docker-push:
    deps:
      - docker-build
    desc: |
            Push the docker image
    cmds:
      - docker push "{{.REGISTRY}}/{{.IMAGE}}:{{.GIT_HASH}}"

  docker-publish:
    deps:
      - docker-push
    desc: |
            Publish this release as LATEST
    cmds:
      - echo 'Version {{.GIT_TAG}} with GIT Hash {{.GIT_HASH}} being released'
      - docker tag "{{.REGISTRY}}/{{.IMAGE}}:{{.GIT_HASH}}" "{{.REGISTRY}}/{{.IMAGE}}:latest"
      - docker tag "{{.REGISTRY}}/{{.IMAGE}}:{{.GIT_HASH}}" "{{.REGISTRY}}/{{.IMAGE}}:{{.GIT_TAG}}"
      - docker push "{{.REGISTRY}}/{{.IMAGE}}:latest"
      - docker push "{{.REGISTRY}}/{{.IMAGE}}:{{.GIT_TAG}}"
    preconditions:
      - sh: "[ '{{.GIT_TAG}}' != '<no value>' ]"
        msg: "Variable .GIT_TAG is not set"

  dev-build:
    desc: |
            Build a dev image tagged :dev and :dev-<hash> for testing.
            Optional: task dev-build NORDVPN_VERSION=4.6.0 to override the pinned version.
    vars:
      NORDVPN_VERSION: '{{.NORDVPN_VERSION | default ""}}'
    cmds:
      - bash scripts/dev-build.sh "{{.GIT_HASH}}" "{{.NORDVPN_VERSION}}"

  dev-push:
    deps:
      - dev-build
    desc: |
            Push all dev tags (:dev, :dev-<hash>, :dev-<version>, :<image_version>-dev) to Docker Hub.
    vars:
      DF_NORDVPN:
        sh: grep "ARG NORDVPN_VERSION" Dockerfile | sed "s/ARG NORDVPN_VERSION='//;s/'$//"
      DF_IMAGE:
        sh: grep "ARG IMAGE_VERSION" Dockerfile | sed "s/ARG IMAGE_VERSION='//;s/'$//"
      NORD_VER: '{{.NORDVPN_VERSION | default .DF_NORDVPN}}'
    cmds:
      - docker push "{{.REGISTRY}}/{{.IMAGE}}:dev"
      - docker push "{{.REGISTRY}}/{{.IMAGE}}:dev-{{.GIT_HASH}}"
      - docker push "{{.REGISTRY}}/{{.IMAGE}}:dev-{{.NORD_VER}}"
      - docker push "{{.REGISTRY}}/{{.IMAGE}}:{{.DF_IMAGE}}-dev"
      - 'echo "Pushed: {{.REGISTRY}}/{{.IMAGE}}:dev"'
      - 'echo "Pushed: {{.REGISTRY}}/{{.IMAGE}}:dev-{{.GIT_HASH}}"'
      - 'echo "Pushed: {{.REGISTRY}}/{{.IMAGE}}:dev-{{.NORD_VER}}"'
      - 'echo "Pushed: {{.REGISTRY}}/{{.IMAGE}}:{{.DF_IMAGE}}-dev"'

  dev-latest:
    desc: |
            Scrape NordVPN repo for the newest available version, then build a dev image with it.
    cmds:
      - bash scripts/dev-latest.sh "{{.GIT_HASH}}"

  dev-clean:
    desc: |
            Remove local dev images (:dev and :dev-* tags).
    cmds:
      - bash scripts/dev-clean.sh

  verify:
    desc: |
      Smoke-test the locally built image (run after task docker-build).
      Checks /.version, nordvpn version, iptables kill-switch, and daemon socket.
    cmds:
      - bash scripts/verify.sh

  verify-live:
    desc: |
      Real-token NordVPN connect + Spain egress test. Mandatory pre-release gate.
      task verify uses a fake token and cannot validate tunnel connectivity; this can.
      Usage: task verify-live TOKEN_FILE=~/.nordvpn-test-token
    vars:
      TOKEN_FILE: '{{.TOKEN_FILE | default ""}}'
    preconditions:
      - sh: '[ -n "{{.TOKEN_FILE}}" ]'
        msg: "TOKEN_FILE is required. Usage: task verify-live TOKEN_FILE=/path/to/token"
    cmds:
      - TOKEN_FILE="{{.TOKEN_FILE}}" bash scripts/connect-test.sh "{{.REGISTRY}}/{{.IMAGE}}:{{.GIT_HASH}}" nordvpn_verify_live Spain

  check-version:
    desc: Check if a newer NordVPN version is available in the official package repo
    cmds:
      - bash scripts/check-version.sh

  check-base:
    desc: Check if a newer base image digest is available for ghcr.io/linuxserver/baseimage-ubuntu:noble
    cmds:
      - bash scripts/check-base-image.sh

  bump:
    desc: |
      Bump NordVPN and image versions across all files, then show the diff.
      Usage: task bump NORDVPN_VERSION=4.6.0 IMAGE_VERSION=5.6.0
      Does NOT commit, tag, build, or push — human reviews diff and proceeds manually.
    preconditions:
      - sh: '[ -n "{{.NORDVPN_VERSION}}" ]'
        msg: "NORDVPN_VERSION is required. Usage: task bump NORDVPN_VERSION=4.6.0 IMAGE_VERSION=5.6.0"
      - sh: '[ -n "{{.IMAGE_VERSION}}" ]'
        msg: "IMAGE_VERSION is required. Usage: task bump NORDVPN_VERSION=4.6.0 IMAGE_VERSION=5.6.0"
    cmds:
      - bash scripts/bump.sh "{{.NORDVPN_VERSION}}" "{{.IMAGE_VERSION}}"

  release:
    desc: |
      Tag the current commit and push to trigger the GitHub publish workflow.
      Reads IMAGE_VERSION and NORDVPN_VERSION from Dockerfile — no manual input required.
      Run after: task docker-build && task verify
    vars:
      DF_NORDVPN:
        sh: grep "ARG NORDVPN_VERSION" Dockerfile | sed "s/ARG NORDVPN_VERSION='//;s/'$//"
      DF_IMAGE:
        sh: grep "ARG IMAGE_VERSION" Dockerfile | sed "s/ARG IMAGE_VERSION='//;s/'$//"
    preconditions:
      - sh: '[ -z "$(git status --porcelain)" ]'
        msg: "Working tree is not clean. Commit or stash all changes before releasing."
      - sh: '! git tag | grep -qx "{{.DF_IMAGE}}"'
        msg: "Tag {{.DF_IMAGE}} already exists. Has this version already been released?"
    cmds:
      - echo "Tagging {{.DF_IMAGE}} — NordVPN {{.DF_NORDVPN}}"
      - git tag -a "{{.DF_IMAGE}}" -m "bump to NordVPN {{.DF_NORDVPN}}"
      - echo "Pushing tag to origin — this triggers the GitHub publish workflow..."
      - git push --tags
      - echo "Done. Monitor at https://github.com/fredplex/nordvpnplex/actions"
