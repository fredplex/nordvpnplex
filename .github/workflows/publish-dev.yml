name: Publish Dev to Docker Hub

# Manually triggered workflow to build and publish a dev image.
# Pushes fredplex/nordvpn:dev and :dev-<sha> to Docker Hub.
# Never touches :latest or creates git tags.
# Required secrets: DOCKER_USERNAME, DOCKER_TOKEN

on:
  workflow_dispatch:
    inputs:
      nordvpn_version:
        description: 'NordVPN version (blank = use pinned, "latest" = auto-discover newest, or specify x.y.z)'
        required: false
        default: ''
      image_version:
        description: 'Image version override (blank = auto-calculate based on Dockerfile version + "-dev")'
        required: false
        default: ''
      base_digest:
        description: 'Base image digest pin override (blank = use pinned in Dockerfile)'
        required: false
        default: ''
  workflow_call:
    inputs:
      nordvpn_version:
        type: string
        description: 'NordVPN version (blank = use pinned, "latest" = auto-discover newest, or specify x.y.z)'
        required: false
        default: ''
      image_version:
        type: string
        description: 'Image version override (blank = auto-calculate based on Dockerfile version + "-dev")'
        required: false
        default: ''
      base_digest:
        type: string
        description: 'Base image digest pin override (blank = use pinned in Dockerfile)'
        required: false
        default: ''

concurrency:
  # Group key must stay unique across caller + reusable workflows.
  # github.workflow evaluates to the caller's name inside this called workflow,
  # so a shared formula with check-base-image.yml / check-nordvpn-release.yml
  # causes a deadlock. Use this workflow's own name as the prefix.
  group: publish-dev-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-dev:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve NordVPN and Image versions
        id: version
        run: |
          PINNED_NORD=$(grep "ARG NORDVPN_VERSION" Dockerfile | sed "s/ARG NORDVPN_VERSION='//;s/'$//")
          PINNED_IMG=$(grep "ARG IMAGE_VERSION" Dockerfile | sed "s/ARG IMAGE_VERSION='//;s/'$//")

          # 1. Resolve NordVPN version
          if [[ "${{ inputs.nordvpn_version }}" == "latest" ]]; then
            LATEST=$(bash scripts/get-latest-version.sh)
            echo "version=${LATEST}" >> "$GITHUB_OUTPUT"
            echo "nord_source=latest available in repo" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ inputs.nordvpn_version }}" ]]; then
            echo "version=${{ inputs.nordvpn_version }}" >> "$GITHUB_OUTPUT"
            echo "nord_source=manual override" >> "$GITHUB_OUTPUT"
          else
            echo "version=${PINNED_NORD}" >> "$GITHUB_OUTPUT"
            echo "nord_source=pinned in Dockerfile" >> "$GITHUB_OUTPUT"
          fi

          # 2. Resolve Image version (default: pinned + "-dev")
          if [[ -n "${{ inputs.image_version }}" ]]; then
            echo "image_version=${{ inputs.image_version }}" >> "$GITHUB_OUTPUT"
          else
            echo "image_version=${PINNED_IMG}-dev" >> "$GITHUB_OUTPUT"
          fi

          # 3. Resolve Base Digest
          if [[ -n "${{ inputs.base_digest }}" ]]; then
            echo "base_digest=${{ inputs.base_digest }}" >> "$GITHUB_OUTPUT"
          else
            PINNED_DIGEST=$(grep "ARG BASE_DIGEST=" Dockerfile | sed "s/ARG BASE_DIGEST='//;s/'$//")
            echo "base_digest=${PINNED_DIGEST}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build dev image locally (for smoke tests)
        id: build-verify
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          build-args: |
            NORDVPN_VERSION=${{ steps.version.outputs.version }}
            IMAGE_VERSION=${{ steps.version.outputs.image_version }}
            BASE_DIGEST=${{ steps.version.outputs.base_digest }}
          tags: fredplex/nordvpn:temp-dev

      - name: Run unified smoke tests (verify.sh)
        run: |
          bash scripts/verify.sh "fredplex/nordvpn:temp-dev" "${{ steps.version.outputs.version }}" "${{ steps.version.outputs.image_version }}"

      - name: Tag and push dev image
        run: |
          docker tag fredplex/nordvpn:temp-dev fredplex/nordvpn:dev
          docker tag fredplex/nordvpn:temp-dev fredplex/nordvpn:dev-${{ github.sha }}
          docker tag fredplex/nordvpn:temp-dev fredplex/nordvpn:dev-${{ steps.version.outputs.version }}
          docker tag fredplex/nordvpn:temp-dev fredplex/nordvpn:${{ steps.version.outputs.image_version }}
          
          docker push fredplex/nordvpn:dev
          docker push fredplex/nordvpn:dev-${{ github.sha }}
          docker push fredplex/nordvpn:dev-${{ steps.version.outputs.version }}
          docker push fredplex/nordvpn:${{ steps.version.outputs.image_version }}

      - name: Summary
        run: |
          echo "============================================"
          echo "  Dev image published successfully"
          echo "  Tag:    fredplex/nordvpn:dev"
          echo "  Tag:    fredplex/nordvpn:dev-${{ github.sha }}"
          echo "  Tag:    fredplex/nordvpn:dev-${{ steps.version.outputs.version }}"
          echo "  Tag:    fredplex/nordvpn:${{ steps.version.outputs.image_version }}"
          echo "  NordVPN: ${{ steps.version.outputs.version }} (${{ steps.version.outputs.nord_source }})"
          echo "  IMAGE_VERSION: ${{ steps.version.outputs.image_version }}"
          echo "============================================"
