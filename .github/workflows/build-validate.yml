name: Build Validation

# Runs docker build on every PR to main.
# Build only — no registry login, no push.
# Catches Dockerfile syntax errors, broken apt installs, and bad COPY paths early.

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (validation only — no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          build-args: |
            IMAGE_VERSION=ci-validation
