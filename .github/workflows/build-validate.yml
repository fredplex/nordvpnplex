name: Build Validation

# Runs docker build on every PR to main.
# Build only — no registry login, no push.
# Catches Dockerfile syntax errors, broken apt installs, and bad COPY paths early.

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (validation only — no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          build-args: |
            IMAGE_VERSION=ci-validation
          tags: fredplex/nordvpn:temp-validate

      - name: Run unified smoke tests (verify.sh)
        run: |
          NORDVPN_VERSION=$(grep "ARG NORDVPN_VERSION" Dockerfile | sed "s/ARG NORDVPN_VERSION='//;s/'$//")
          bash scripts/verify.sh "fredplex/nordvpn:temp-validate" "${NORDVPN_VERSION}" "ci-validation"
