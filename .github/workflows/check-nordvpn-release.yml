name: Check NordVPN Release

# Runs daily to detect new NordVPN versions in the official package repo.
# If a newer version is found, builds+verifies a dev image, pushes dev tags to
# Docker Hub, and opens a draft PR with the bump already applied.
# Merging the PR auto-triggers publish.yml (production build, smoke tests, and
# Docker Hub push) via its Dockerfile path filter — no manual build/tag step.

on:
  schedule:
    - cron: '0 8 * * *'   # Every day at 08:00 UTC
  workflow_dispatch:         # Allow manual trigger from GitHub Actions UI

concurrency:
  # Group key must stay unique across caller + reusable workflows.
  # github.workflow evaluates to the caller's name inside a called workflow,
  # so a shared formula here and in publish-dev.yml causes a deadlock.
  group: check-nordvpn-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      update_available: ${{ steps.check.outputs.update_available }}
      current_version: ${{ steps.check.outputs.current }}
      latest_version: ${{ steps.check.outputs.latest }}
      current_image_version: ${{ steps.image_version.outputs.current }}
      suggested_image_version: ${{ steps.image_version.outputs.suggested }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for new NordVPN version
        id: check
        run: |
          CURRENT=$(grep "ARG NORDVPN_VERSION" Dockerfile | sed "s/ARG NORDVPN_VERSION='//;s/'$//")
          LATEST=$(bash scripts/get-latest-version.sh)

          echo "current=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"

          if [[ "${LATEST}" == "${CURRENT}" ]]; then
            echo "update_available=false" >> "$GITHUB_OUTPUT"
            echo "No update: ${CURRENT} is already the latest."
          else
            echo "update_available=true" >> "$GITHUB_OUTPUT"
            echo "New version available: ${LATEST} (currently pinned: ${CURRENT})"
          fi

      - name: Calculate suggested IMAGE_VERSION
        if: steps.check.outputs.update_available == 'true'
        id: image_version
        run: |
          CURRENT_IMAGE=$(grep "ARG IMAGE_VERSION" Dockerfile | sed "s/ARG IMAGE_VERSION='//;s/'$//")
          IFS='.' read -r major minor patch <<< "${CURRENT_IMAGE}"
          SUGGESTED="${major}.${minor}.$((patch + 1))"
          echo "current=${CURRENT_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "suggested=${SUGGESTED}" >> "$GITHUB_OUTPUT"

  publish-dev:
    needs: check-version
    if: needs.check-version.outputs.update_available == 'true'
    uses: ./.github/workflows/publish-dev.yml
    with:
      nordvpn_version: ${{ needs.check-version.outputs.latest_version }}
      image_version: ${{ needs.check-version.outputs.suggested_image_version }}-dev
    secrets: inherit

  create-pr:
    needs: [check-version, publish-dev]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for an already-open bump PR
        id: guard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Both this workflow and check-base-image.yml bump Dockerfile/README.md
          # via scripts/bump.sh. If one's PR is still open, don't open a second — it would
          # conflict with or silently clobber the first PR's version fields.
          EXISTING=$(gh pr list --state open --json number,headRefName,url --jq '[.[] | select(.headRefName | startswith("auto/"))]')
          if [[ "$(echo "${EXISTING}" | jq 'length')" -gt 0 ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "An auto/* bump PR is already open — skipping this run to avoid a conflicting second bump:"
            echo "${EXISTING}" | jq -r '.[] | "  - #\(.number) (\(.headRefName)): \(.url)"'
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply version bump
        if: steps.guard.outputs.skip != 'true'
        run: |
          bash scripts/bump.sh \
            "${{ needs.check-version.outputs.latest_version }}" \
            "${{ needs.check-version.outputs.suggested_image_version }}"

      - name: Open draft PR
        if: steps.guard.outputs.skip != 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto/nordvpn-${{ needs.check-version.outputs.latest_version }}
          commit-message: "chore: bump NordVPN ${{ needs.check-version.outputs.current_version }} → ${{ needs.check-version.outputs.latest_version }}"
          title: "chore: bump NordVPN ${{ needs.check-version.outputs.current_version }} → ${{ needs.check-version.outputs.latest_version }}"
          body: |
            NordVPN `${{ needs.check-version.outputs.latest_version }}` is now available in the official package repo.

            A development build has already been successfully built, tested, and published to Docker Hub:
            * **Dev Image**: `fredplex/nordvpn:dev-${{ needs.check-version.outputs.latest_version }}`
            * **Moving Dev Tag**: `fredplex/nordvpn:dev`

            ## Changes applied by automation
            | Field | Before | After |
            |---|---|---|
            | `NORDVPN_VERSION` | `${{ needs.check-version.outputs.current_version }}` | `${{ needs.check-version.outputs.latest_version }}` |
            | `IMAGE_VERSION` | `${{ needs.check-version.outputs.current_image_version }}` | `${{ needs.check-version.outputs.suggested_image_version }}` *(suggested — adjust if needed)* |

            ## Before merging (Testing Instructions)
            - [ ] Pull the dev build to your testing system (e.g. Unraid):
              ```bash
              docker pull fredplex/nordvpn:dev-${{ needs.check-version.outputs.latest_version }}
              ```
            - [ ] Update your test container to use this image and verify the VPN connects and traffic flows correctly.
            - [ ] Ran `task verify-live TOKEN_FILE=<path>` against the dev image and confirmed Spain egress (the mandatory pre-release gate — `task verify` alone cannot validate tunnel connectivity).
            - [ ] Review the PR file diff.
            - [ ] Check [NordVPN release notes](https://nordvpn.com/blog/nordvpn-linux-release-notes/) for any breaking changes.

            ## After merging
            Merging this PR will automatically trigger the production release pipeline:
            - A production image will be built and verified.
            - It will be pushed as `fredplex/nordvpn:latest` and `fredplex/nordvpn:${{ needs.check-version.outputs.suggested_image_version }}`.
            - A git release tag `${{ needs.check-version.outputs.suggested_image_version }}` will be automatically pushed back to git.

            > **Draft PR** — do not merge until you have tested the dev image and reviewed the parameters.
          draft: true
