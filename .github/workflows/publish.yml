name: Publish to Docker Hub

# Triggered when:
# 1. The owner pushes a semver git tag (e.g. 5.6.0)
# 2. A PR is merged into main (push to main) that changes version numbers in Dockerfile
# 3. Manually triggered via GitHub Actions UI (workflow_dispatch)

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
    branches:
      - main
  workflow_dispatch:
    inputs:
      nordvpn_version:
        type: string
        description: 'NordVPN version override (blank = use pinned in Dockerfile)'
        required: false
        default: ''
      image_version:
        type: string
        description: 'Image version override (blank = use pinned in Dockerfile)'
        required: false
        default: ''

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release versions
        id: release_version
        run: |
          # 1. Read from Dockerfile
          PINNED_NORDVPN=$(grep "ARG NORDVPN_VERSION" Dockerfile | sed "s/ARG NORDVPN_VERSION='//;s/'$//")
          PINNED_IMAGE=$(grep "ARG IMAGE_VERSION" Dockerfile | sed "s/ARG IMAGE_VERSION='//;s/'$//")
          
          IMAGE_VERSION="${PINNED_IMAGE}"
          NORDVPN_VERSION="${PINNED_NORDVPN}"
          SOURCE="push/merge to main"
          RELEASE_NEEDED="true"
          
          # 2. Check tag trigger
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            IMAGE_VERSION="${{ github.ref_name }}"
            NORDVPN_VERSION="${PINNED_NORDVPN}"
            SOURCE="git tag push"
          # 3. Check manual dispatch overrides
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            NORDVPN_VERSION="${{ inputs.nordvpn_version }}"
            IMAGE_VERSION="${{ inputs.image_version }}"
            if [[ -z "${NORDVPN_VERSION}" ]]; then NORDVPN_VERSION="${PINNED_NORDVPN}"; fi
            if [[ -z "${IMAGE_VERSION}" ]]; then IMAGE_VERSION="${PINNED_IMAGE}"; fi
            SOURCE="manual workflow dispatch"
          # 4. Check push to main
          else
            # Verify if version bumped in last commit
            git fetch --prune --unshallow || git fetch --prune --depth=2
            if ! git diff HEAD~1 HEAD -- Dockerfile | grep -qE '^\+ARG (NORDVPN|IMAGE)_VERSION='; then
              echo "No version bump detected in Dockerfile. Bypassing production release."
              RELEASE_NEEDED="false"
            else
              echo "Version bump detected! Triggering production release."
            fi
          fi
          
          echo "image_version=${IMAGE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "nordvpn_version=${NORDVPN_VERSION}" >> "$GITHUB_OUTPUT"
          echo "source=${SOURCE}" >> "$GITHUB_OUTPUT"
          echo "release_needed=${RELEASE_NEEDED}" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        if: steps.release_version.outputs.release_needed == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.release_version.outputs.release_needed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build release image locally
        if: steps.release_version.outputs.release_needed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          build-args: |
            NORDVPN_VERSION=${{ steps.release_version.outputs.nordvpn_version }}
            IMAGE_VERSION=${{ steps.release_version.outputs.image_version }}
          tags: fredplex/nordvpn:temp-release

      - name: Smoke test — IMAGE_VERSION label
        if: steps.release_version.outputs.release_needed == 'true'
        run: |
          ACTUAL=$(docker inspect fredplex/nordvpn:temp-release \
            --format '{{index .Config.Labels "org.opencontainers.image.version"}}')
          EXPECTED="${{ steps.release_version.outputs.image_version }}"
          if [[ "${ACTUAL}" == "${EXPECTED}" ]]; then
            echo "PASS: IMAGE_VERSION label = ${ACTUAL}"
          else
            echo "FAIL: expected '${EXPECTED}', got '${ACTUAL}'" >&2
            exit 1
          fi

      - name: Smoke test — nordvpn version
        if: steps.release_version.outputs.release_needed == 'true'
        run: |
          ACTUAL=$(docker run --rm --entrypoint /bin/bash fredplex/nordvpn:temp-release \
            -c "nordvpn --version" 2>/dev/null \
            | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          EXPECTED="${{ steps.release_version.outputs.nordvpn_version }}"
          if [[ "${ACTUAL}" == "${EXPECTED}" ]]; then
            echo "PASS: nordvpn --version = ${ACTUAL}"
          else
            echo "FAIL: expected '${EXPECTED}', got '${ACTUAL}'" >&2
            exit 1
          fi

      - name: Smoke test — iptables kill switch
        if: steps.release_version.outputs.release_needed == 'true'
        run: |
          POLICY=$(docker run --rm \
            --cap-add=NET_ADMIN --cap-add=NET_RAW \
            fredplex/nordvpn:temp-release \
            /bin/bash -c \
            'update-alternatives --set iptables /usr/sbin/iptables-legacy >/dev/null 2>&1 || true;
             iptables -P OUTPUT DROP 2>/dev/null;
             iptables -L OUTPUT 2>/dev/null | head -1' \
            | grep -oE 'policy [A-Z]+' | awk '{print $2}')
          if [[ "${POLICY}" == "DROP" ]]; then
            echo "PASS: iptables OUTPUT policy = DROP (kill-switch functional)"
          else
            echo "FAIL: expected DROP, got '${POLICY}'" >&2
            exit 1
          fi

      - name: Build and push release image
        if: steps.release_version.outputs.release_needed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: |
            NORDVPN_VERSION=${{ steps.release_version.outputs.nordvpn_version }}
            IMAGE_VERSION=${{ steps.release_version.outputs.image_version }}
          tags: |
            fredplex/nordvpn:latest
            fredplex/nordvpn:${{ steps.release_version.outputs.image_version }}

      # Creates the git tag AND a GitHub Release in one call. Publishing the
      # Release is what sends GitHub's native notification email to repo watchers
      # (Watch -> Custom -> Releases). Auth is the built-in GITHUB_TOKEN — no secrets.
      - name: Publish GitHub Release
        if: steps.release_version.outputs.release_needed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.release_version.outputs.image_version }}"
          NORD_VER="${{ steps.release_version.outputs.nordvpn_version }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists. Skipping."
            exit 0
          fi
          gh release create "$TAG" \
            --target "${{ github.sha }}" \
            --title "nordvpn $TAG — NordVPN ${NORD_VER}" \
            --notes "Published \`fredplex/nordvpn:latest\` and \`:$TAG\` to Docker Hub. NordVPN client ${NORD_VER}. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Summary
        if: steps.release_version.outputs.release_needed == 'true'
        run: |
          echo "============================================"
          echo "  Production image published successfully"
          echo "  Tag:    fredplex/nordvpn:latest"
          echo "  Tag:    fredplex/nordvpn:${{ steps.release_version.outputs.image_version }}"
          echo "  NordVPN: ${{ steps.release_version.outputs.nordvpn_version }}"
          echo "  Source:  ${{ steps.release_version.outputs.source }}"
          echo "============================================"
