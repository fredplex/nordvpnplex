name: Publish to Docker Hub

# Triggered when the owner pushes a semver git tag (e.g. 5.6.0).
# Builds the image and pushes :latest + :<tag> to Docker Hub.
# Required secrets: DOCKER_USERNAME, DOCKER_TOKEN (set in repo Settings → Secrets)

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: |
            IMAGE_VERSION=${{ github.ref_name }}
          tags: |
            fredplex/nordvpn:latest
            fredplex/nordvpn:${{ github.ref_name }}
